<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Kitchen</title>
    <style>
        body{
    background:#ff7a1a;
    font-family:Arial;
    display:flex;
    justify-content:center;
    padding-top:50px;
}

.container{
    width:400px;
    text-align:center;
    color:white;
}

.search-box{
    display:flex;
    gap:10px;
    margin-top:20px;
}

input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:white;
    cursor:pointer;
    font-weight:bold;
}

.results{
    margin-top:30px;
}

.card{
    background:white;
    color:black;
    border-radius:12px;
    padding:10px;
    margin-bottom:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.card img{
    width:320px;
    height:120px;
    object-fit:cover;
    border-radius:10px;
    display:block;
    margin:0 auto;
}

.card h3{
    margin:10px 0;
}

.card a{
    display:inline-block;
    margin-top:10px;
    text-decoration:none;
    background:#ff7a1a;
    color:white;
    padding:8px 12px;
    border-radius:6px;
}
    </style>
    <script>
        async function findMeal(){

    let ingredient = document.getElementById("ingredients").value;
    let results = document.getElementById("results");

    results.innerHTML = "Loading...";

    let response = await fetch(
        `https://www.themealdb.com/api/json/v1/1/filter.php?i=${ingredient}`
    );

    let data = await response.json();

    results.innerHTML = "";

    if(!data.meals){
        results.innerHTML = "No meals found";
        return;
    }

    data.meals.slice(0,5).forEach(meal => {

        results.innerHTML += `
<div class="card">
<img src="${meal.strMealThumb}">
<h3>${meal.strMeal}</h3>
<a href="https://www.themealdb.com/meal/${meal.idMeal}" target="_blank">
View Recipe
</a>
</div>
`;

    });

}
    </script>
</head>

<body>

<div class="container">

    <h1>🍳 Smart Kitchen</h1>
    <p>Enter ingredients (egg, tomato, cheese)</p>

    <div class="search-box">
        <input type="text" id="ingredients" placeholder="egg, tomato, cheese">
        <button onclick="findMeal()">Find Meal</button>
    </div>

    <div id="results" class="results"></div>

</div>

<script src="kitchen.js"></script>
</body>

</html>
